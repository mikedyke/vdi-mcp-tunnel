# Plugin version (also injected into plugin.xml by the Gradle plugin)
pluginVersion = 0.1.0

# IntelliJ Platform to build against. CHANGE to your VDI's exact build (Help > About).
# 2026.2 shown; use a full build like 2026.2.1 to pin precisely.
platformVersion = 2026.2

org.gradle.jvmargs = -Xmx2g -Dfile.encoding=UTF-8
org.gradle.caching = true
kotlin.stdlib.default.dependency = false
