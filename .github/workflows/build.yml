name: Build plugin

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]        # tagging vX.Y.Z publishes a release with the zip attached
  pull_request:
  workflow_dispatch:

permissions:
  contents: write         # required to create releases on tag builds

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'   # IntelliJ Platform Gradle Plugin 2.x needs Gradle 8.5+

      - name: Build plugin
        working-directory: bridge-plugin
        run: gradle buildPlugin --no-daemon --stacktrace

      - name: Upload plugin zip (workflow artifact)
        uses: actions/upload-artifact@v4
        with:
          name: vdi-tunnel-bridge
          path: bridge-plugin/build/distributions/*.zip
          if-no-files-found: error

      - name: Attach zip to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bridge-plugin/build/distributions/*.zip
