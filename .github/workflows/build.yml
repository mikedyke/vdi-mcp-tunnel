name: Build plugin

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]        # tagging vX.Y.Z publishes a release with the zip attached
  pull_request:
  workflow_dispatch:

permissions:
  contents: write         # required to create releases on tag builds

jobs:
  # Cheap and SDK-free: guards the two mirrored codec implementations against each
  # other. Runs on its own so a broken codec reports in seconds instead of waiting
  # on the ~1 GB IDE SDK download the plugin build needs.
  parity:
    name: Codec parity (host + bridge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Host codec tests            # stdlib only, no requirements.txt needed
        run: python -m unittest discover -s host/tests -v

      - name: Vectors still match the host implementation
        run: |
          python host/tools/gen_parity_vectors.py
          git diff --exit-code -- vectors/parity-vectors.txt \
            || { echo "::error::vectors/parity-vectors.txt is stale — regenerate it and update PROTOCOL.md"; exit 1; }

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.6.1'

      - name: Bridge codec tests
        working-directory: codec-parity
        run: gradle test --no-daemon --stacktrace

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: codec-parity-report
          path: codec-parity/build/reports/tests/test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.6.1'  # IntelliJ Platform Gradle Plugin 2.18+ needs Gradle 9.0+

      - name: Build plugin
        working-directory: bridge-plugin
        run: gradle buildPlugin --no-daemon --stacktrace

      - name: Upload plugin zip (workflow artifact)
        uses: actions/upload-artifact@v4
        with:
          name: vdi-tunnel-bridge
          path: bridge-plugin/build/distributions/*.zip
          if-no-files-found: error

      - name: Attach zip to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bridge-plugin/build/distributions/*.zip
